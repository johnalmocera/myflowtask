<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="panel dashboard-panel">
      <div class="panel-heading-inline">
        <div>
          <h2>Dashboard summary</h2>
          <p>Quick view of where your tasks are right now.</p>
        </div>
        <div class="brand">
          <div class="brand-mark">TF</div>
          <div>
            <p>TaskFlow</p>
            <span>Simple task list</span>
          </div>
        </div>
      </div>

      <div class="dashboard-layout">
        <section class="stats-strip" aria-label="Task overview">
          <article class="stat-card">
            <span id="total-count">0</span>
            <small>Total</small>
          </article>
          <article class="stat-card">
            <span id="active-count">0</span>
            <small>Doing</small>
          </article>
          <article class="stat-card">
            <span id="done-count">0</span>
            <small>Done</small>
          </article>
          <article class="stat-card">
            <span id="priority-count">0</span>
            <small>High priority</small>
          </article>
        </section>

        <section class="chart-panel">
          <canvas id="summary-chart" width="640" height="220" aria-label="Task summary chart"></canvas>
        </section>
      </div>
    </section>

    <section class="workspace" id="board">
      <section class="panel board-panel">
        <div class="panel-heading-inline">
          <div>
            <h2>Task list</h2>
            <p>View all tasks in one simple table.</p>
          </div>
          <div class="header-actions">
            <button class="button button-secondary" type="button" id="clear-completed-button">Remove completed</button>
          </div>
        </div>

        <div class="toolbar" aria-label="Task filters">
          <label class="search-field">
            <span class="toolbar-label">Search</span>
            <input type="search" id="search-input" placeholder="Search title, description, or category">
          </label>

          <label>
            <span class="toolbar-label">Filter</span>
            <select id="filter-status">
              <option value="all">All statuses</option>
              <option value="todo">To do</option>
              <option value="doing">Doing</option>
              <option value="revision">Revision</option>
              <option value="done">Done</option>
            </select>
          </label>

          <label>
            <span class="toolbar-label">Sort by</span>
            <select id="sort-select">
              <option value="workflow">Workflow order</option>
              <option value="priority">Priority</option>
              <option value="due-date">Due date</option>
              <option value="status">Status</option>
            </select>
          </label>
        </div>

        <div class="add-group-inline" id="add-group-inline">
          <input type="text" id="group-name-input" placeholder="New group name">
          <input type="color" id="group-color-input" value="#2563eb" aria-label="Group color">
          <button class="button button-primary" type="button" id="save-group-button">Create group</button>
        </div>

        <div class="grouped-tables" id="grouped-tables"></div>
        <p class="empty-state" id="empty-state">No tasks found.</p>
      </section>
    </section>
  </main>

  <div class="modal-backdrop" id="confirm-modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
      <h3 id="confirm-modal-title">Delete group</h3>
      <p class="modal-text" id="confirm-modal-text">Are you sure you want to delete this group?</p>
      <div class="modal-actions">
        <button class="button button-secondary" type="button" id="confirm-no-button">No</button>
        <button class="button button-primary" type="button" id="confirm-yes-button">Yes</button>
      </div>
    </div>
  </div>

  <template id="group-table-template">
    <section class="group-table-section">
      <div class="group-table-header">
        <div class="group-table-heading">
          <div class="group-title-row">
            <input class="group-name-input" type="text" aria-label="Group name">
            <input class="group-header-color-input" type="color" aria-label="Group color">
          </div>
          <p class="group-table-subtitle">Tasks for this group</p>
        </div>
        <div class="group-table-meta">
          <span class="group-table-count"></span>
          <button class="button button-secondary group-toggle-button" type="button" aria-label="Hide group">-</button>
          <button class="button button-ghost group-delete-button" type="button" aria-label="Delete group">x</button>
        </div>
      </div>
      <div class="table-wrap group-table-content">
        <table class="task-table">
          <thead>
            <tr>
              <th>Task name</th>
              <th>Status</th>
              <th>Due date</th>
              <th>Priority</th>
              <th>Group</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody class="task-table-body"></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="task-template">
    <tr class="task-row">
      <td>
        <div class="task-name-cell">
          <strong class="task-title"></strong>
        </div>
      </td>
      <td>
        <select class="task-status-select" aria-label="Change task status">
          <option value="todo">To do</option>
          <option value="doing">Doing</option>
          <option value="revision">Revision</option>
          <option value="done">Done</option>
        </select>
      </td>
      <td>
        <input class="task-due-date-input" type="date" aria-label="Task due date">
      </td>
      <td><span class="priority-badge"></span></td>
      <td><span class="task-category"></span></td>
      <td>
        <button class="button button-ghost task-delete" type="button" aria-label="Delete task">🗑</button>
      </td>
    </tr>
  </template>

  <template id="add-task-row-template">
    <tr class="add-task-row">
      <td>
        <input class="new-task-title" type="text" placeholder="Add new task">
      </td>
      <td>
        <select class="new-task-status" aria-label="New task status">
          <option value="todo">To do</option>
          <option value="doing">Doing</option>
          <option value="revision">Revision</option>
          <option value="done">Done</option>
        </select>
      </td>
      <td>
        <input class="new-task-due-date" type="date" aria-label="New task due date">
      </td>
      <td>
        <select class="new-task-priority" aria-label="New task priority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </td>
      <td><span class="new-task-category"></span></td>
      <td>
        <button class="button button-primary add-task-inline-button" type="button">Add task</button>
      </td>
    </tr>
  </template>

  <script type="module" src="script.js"></script>
</body>
</html>
